{{define "members"}}
{{template "page_start" .}}
{{template "topbar" .}}
{{template "flash" .}}
{{if .IsOwner}}
<section class="utility-panel utility-panel--feature">
  <div class="section-heading">
    <div class="section-heading__copy">
      <h2>Invite member</h2>
    </div>
    <span id="members-message" class="inline-message"></span>
  </div>
  <form action="/settings/members/invite" method="post" class="utility-form" data-async-form data-refresh-targets="#members-panel" data-reset-on-success="true" data-message-target="#members-message">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <label>
      <span class="field-label">Email</span>
      <input type="email" name="email" placeholder="name@gmail.com" required>
    </label>
    <button class="primary-button" type="submit">Create invite</button>
  </form>
</section>
{{end}}
<section id="members-panel" data-poll-url="/settings/members?fragment=1" data-poll-interval="{{.PollSeconds}}">
  {{template "members_fragment" .}}
</section>
{{template "page_end" .}}
{{end}}
