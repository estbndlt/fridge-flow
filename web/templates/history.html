{{define "history"}}
{{template "page_start" .}}
{{template "topbar" .}}
{{template "flash" .}}
<section class="hero-card hero-card--tight">
  <div>
    <p class="hero-card__label">History</p>
    <h2>Quick re-add for the regulars.</h2>
  </div>
  <p class="hero-card__copy">Purchased items stay here so recurring groceries come back in one tap.</p>
</section>
<section id="history-panel" data-poll-url="/history?fragment=1" data-poll-interval="{{.PollSeconds}}">
  {{template "history_fragment" .}}
</section>
{{template "page_end" .}}
{{end}}
