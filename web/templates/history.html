{{define "history"}}
{{template "page_start" .}}
{{template "topbar" .}}
{{template "flash" .}}
<section class="section-banner">
  <div class="section-banner__body">
    <p class="section-banner__kicker">Purchased items</p>
    <h2>Repeat buys</h2>
    <p class="section-banner__copy">Keep regulars close so you can bring them back to the live list in one tap.</p>
  </div>
</section>
<section id="history-panel" data-poll-url="/history?fragment=1" data-poll-interval="{{.PollSeconds}}">
  {{template "history_fragment" .}}
</section>
{{template "page_end" .}}
{{end}}
