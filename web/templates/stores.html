{{define "stores"}}
{{template "page_start" .}}
{{template "topbar" .}}
{{template "flash" .}}
<section class="utility-panel utility-panel--feature">
  <div class="section-heading">
    <div class="section-heading__copy">
      <h2>Add store</h2>
    </div>
    <span id="stores-message" class="inline-message"></span>
  </div>
  <form action="/stores" method="post" class="utility-form" data-async-form data-refresh-targets="#stores-panel" data-reset-on-success="true" data-message-target="#stores-message">
    <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
    <label>
      <span class="field-label">Store name</span>
      <input type="text" name="name" placeholder="Trader Joe's" required>
    </label>
    <button class="primary-button" type="submit">Save store</button>
  </form>
</section>
<section id="stores-panel" data-poll-url="/stores?fragment=1" data-poll-interval="{{.PollSeconds}}">
  {{template "stores_fragment" .}}
</section>
{{template "page_end" .}}
{{end}}
